include-file = ~/.config/polybar/colors.ini

[bar/top]
width = 100%
height = 24pt
;radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = ${colors.border}

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono;2
font-1 = MaterialIcons, size=12
font-2 = Hack Nerd Font:style=Regular, size=12 
font-3 = Noto Emoji:scale=12:antialias=false;0

modules-left = xworkspaces xwindow
; modules-center = updates

modules-center = pulseaudio battery backlight 
modules-right = polypomo memory cpu wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

bottom = false
; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true
;
; add custom polypomo module
[module/polypomo]
type = custom/script

# default is 25min worktime / 3min break. Convert to seconds 
exec = ~/.config/polybar/polypomo --worktime 2700 --breaktime 300
tail = true

;label-foreground = ${colors.primary}
label = %output%

click-left = ~/.config/polybar/polypomo toggle
click-right = ~/.config/polybar/polypomo end
click-middle = ~/.config/polybar/polypomo lock
scroll-up = ~/.config/polybar/polypomo time +60
scroll-down = ~/.config/polybar/polypomo time -60

[bar/bottom]
width = 60%
height = 20pt
;radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = ${colors.border}

padding-left = 0
padding-right = 1

module-margin = 1

offset-x = 20%

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono;2
font-1 = Font Awesome 5 Free Solid:style=solid, size=12;1
font-2 = Weather Icons:size=12;1
font-3 = FontAwesome5Brands:style=Regular:size=13;4

modules-center = spotify
modules-left = info-hackspeed i3 speedtest
modules-right = openweathermap pulseaudio xkeyboard

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

bottom = true
tray-position = none

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

override-redirect = true

[bar/dummy]
width = 15%
height = 24pt
radius = 0

; dpi = 96

background = #00
foreground = #00

line-size = 3pt

border-size = 4pt
border-color = #00

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = #00

font-0 = JetBrainsMono:size=8
font-1 = Font Awesome 5 Free Solid:style=solid, size=12;1
font-2 = FontAwesome5Brands:style=Regular:size=20;4

modules-left = dummy github-profile

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

bottom = true
; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/i3]
type = internal/i3

format = <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-background = ${colors.background-alt}
label-mode-underline = ${colors.resize}

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.underline}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/battery]
type = internal/battery

full-at = 99
low-at = 10 
; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT1
adapter = ACAD

time-format = %H:%M

poll-interval = 5

animation-discharging-foreground = ${colors.primary}

format-charging = <animation-charging> <label-charging>
format-discharging = <animation-discharging> <label-discharging>
format-low = <label-low> <animation-low>

animation-charging-0 ="ůĪźč"
animation-charging-foreground = ${colors.orange}

animation-discharging-0 = "ÔČĀ "
label-charging = "%percentage%%"
label-discharging = "%percentage%%"

ramp-capacity-0 = "ÔČĄ "
ramp-capacity-1 = "ÔČÉ "
ramp-capacity-2 = "ÔČā "
ramp-capacity-3 = "ÔČĀ "
ramp-capacity-4 = "ÔČÄ "
ramp-capacity-1-foreground = ${colors.red}
ramp-capacity-2-foreground = ${colors.yellow}
ramp-capacity-3-foreground = ${colors.green}
ramp-capacity-4-foreground = ${colors.green}

label-full = "ÔČÄ "
label-full-foreground = ${colors.green}

; New in version 3.6.0
label-low ="CHARGE PLS"
label-low-foreground = ${colors.red}

; Only applies if <bar-capacity> is used
bar-capacity-width = 10

; Only applies if <animation-low> is used
; New in version 3.6.0
animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200



[module/dummy]
type = custom/script

[module/github-profile]
type = custom/script
interval = 1
format = <label>
format-prefix = "Ôāí (My GitHub Account :D)"
format-prefix-foreground = #ffffff
exec = echo "hej"
click-left = "firefox --new-window https://github.com/SpamixOfficial"

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix ="ÔíÖ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = "%percentage%%"

label-muted = "ÔĎ¶ "
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = "%layout% ÔĄú"
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/backlight]
type = internal/xbacklight
enable-scroll = false
format-prefix = "ůįÉ† "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
format-disconnected-padding = 1

label-disconnected ="ůįĖ™ "
label-disconnected-foreground = ${colors.disabled}
label-disconnected-padding = 1

[module/wlan]
inherit = network-base
interface = wlp170s0
label-connected = "Ôáę %essid%"

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#BBffffff}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; [module/openweathermap-full]
; type = custom/script
; exec = ~/.config/polybar/scripts/openweathermap-fullfeatured.sh
; interval = 600
; label-font = 3

; [module/openweathermap]
